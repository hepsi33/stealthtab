<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StealthTab — Authenticate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #07070f;
      color: #f0f0ff;
      width: 420px; height: 520px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }

    body::before {
      content: '';
      position: fixed; top: -100px; left: -80px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(99,102,241,0.2) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed; bottom: -80px; right: -60px;
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(139,92,246,0.16) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 340px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 36px 30px 28px;
      box-shadow: 0 0 60px rgba(99,102,241,0.1), 0 30px 60px rgba(0,0,0,0.5);
      backdrop-filter: blur(20px);
    }

    .orb {
      font-size: 44px;
      text-align: center;
      display: block;
      margin-bottom: 18px;
      filter: drop-shadow(0 0 20px rgba(99,102,241,0.6));
      animation: pulse 3s ease-in-out infinite;
      line-height: 1;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); filter: drop-shadow(0 0 18px rgba(99,102,241,0.5)); }
      50% { transform: scale(1.07); filter: drop-shadow(0 0 30px rgba(139,92,246,0.8)); }
    }

    h1 {
      text-align: center;
      font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(90deg, #fff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .sub {
      text-align: center; font-size: 12px; color: #6060a0;
      margin-bottom: 24px; line-height: 1.6;
    }

    /* METHOD TOGGLE */
    .toggle-row {
      display: flex; gap: 6px; margin-bottom: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 4px;
    }
    .toggle-btn {
      flex: 1; padding: 8px; border-radius: 9px;
      border: none; background: transparent;
      font-family: inherit; font-size: 12px; font-weight: 600;
      color: #6060a0; cursor: pointer; transition: all 0.2s;
    }
    .toggle-btn.active {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; box-shadow: 0 4px 12px rgba(99,102,241,0.3);
    }

    /* PANELS */
    .panel { display: none; }
    .panel.active { display: block; }

    /* FIELDS */
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 10px; font-weight: 700;
      letter-spacing: 0.8px; color: #5050a0; text-transform: uppercase;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 10px 14px; font-size: 13px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 11px; color: #f0f0ff; outline: none;
      font-family: inherit; transition: all 0.2s;
    }
    .field input:focus {
      border-color: rgba(99,102,241,0.6);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    /* BIOMETRIC CENTER */
    .bio-area {
      text-align: center; padding: 20px 10px;
    }
    .bio-icon {
      font-size: 52px; display: block; margin-bottom: 12px;
      filter: drop-shadow(0 0 20px rgba(99,102,241,0.5));
      animation: pulse 3s ease-in-out infinite;
      line-height: 1;
    }
    .bio-text { font-size: 12px; color: #6060a0; line-height: 1.7; }

    /* BUTTONS */
    .btn {
      width: 100%; padding: 12px; border-radius: 12px;
      border: none; font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; letter-spacing: -0.2px;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; box-shadow: 0 4px 20px rgba(99,102,241,0.35);
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-ghost {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #7070a0; margin-top: 8px;
      font-size: 12px; font-weight: 500;
    }
    .btn-ghost:hover:not(:disabled) { background: rgba(255,255,255,0.08); color: #a0a0d0; }

    /* MSG */
    .msg {
      font-size: 11px; padding: 9px 12px; border-radius: 9px;
      margin-top: 10px; display: none; line-height: 1.5; text-align: center;
    }
    .msg.err  { display: block; background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); color: #f87171; }
    .msg.ok   { display: block; background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.25); color: #34d399; }
    .msg.warn { display: block; background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.25); color: #fbbf24; }
  </style>
</head>
<body>
  <div class="card">
    <span class="orb">🛡</span>
    <h1>Unlock Tab</h1>
    <p class="sub">Verify your identity to reveal the real content.</p>

    <!-- Method toggle — NO inline onclick (CSP blocks it) -->
    <div class="toggle-row">
      <button class="toggle-btn active" id="btn-toggle-pw">🔑 Password</button>
      <button class="toggle-btn"        id="btn-toggle-bio">🫆 Fingerprint</button>
    </div>

    <!-- Password panel -->
    <div class="panel active" id="panel-password">
      <div class="field">
        <label>Master Password</label>
        <input type="password" id="pw-input" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" id="unlock-pw-btn">Unlock →</button>
    </div>

    <!-- Biometric panel -->
    <div class="panel" id="panel-biometric">
      <div class="bio-area">
        <span class="bio-icon">🫆</span>
        <p class="bio-text">Place your finger on the sensor to authenticate.</p>
      </div>
      <button class="btn btn-primary" id="unlock-bio-btn">Use Fingerprint →</button>
      <!-- NO inline onclick — listener attached in auth.js -->
      <button class="btn btn-ghost" id="btn-use-password-instead">Use password instead</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>

  <!-- Load order matters: storage → crypto → webauthn → auth logic -->
  <script src="../utils/storage.js"></script>
  <script src="crypto.js"></script>
  <script src="webauthn.js"></script>
  <script src="auth.js"></script>
</body>
</html>
